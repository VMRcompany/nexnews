<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexNews - Главные новости России</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #121212; color: #e4e4e7; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="selection:bg-blue-500/30">
    <div id="app">
        <!-- Header -->
        <header class="sticky top-0 z-40 bg-[#121212]/80 backdrop-blur-md border-b border-zinc-800">
            <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button id="menuBtn" class="p-2 hover:bg-zinc-800 rounded-full transition-colors text-zinc-400">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.reload()">
                        <div class="w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-600/20">
                            <i data-lucide="newspaper" class="w-5 h-5 text-white"></i>
                        </div>
                        <span class="text-xl font-bold tracking-tight text-blue-400 hidden sm:block">NexNews</span>
                    </div>
                </div>

                <div class="flex items-center gap-2">
                    <div id="userArea">
                        <button id="loginBtn" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold py-2 px-4 rounded-full transition-all shadow-md shadow-blue-600/20">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-4 h-4" alt="">
                            <span class="hidden sm:inline">Войти</span>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Sidebar Overlay -->
        <div id="sidebarOverlay" class="fixed inset-0 bg-black/60 z-50 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300"></div>
        
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed top-0 left-0 bottom-0 w-72 bg-[#1e1e1e] z-50 shadow-2xl border-r border-zinc-800 p-6 flex flex-col -translate-x-full transition-transform duration-300">
            <div class="flex items-center justify-between mb-10">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                        <i data-lucide="newspaper" class="w-4 h-4 text-white"></i>
                    </div>
                    <span class="text-xl font-bold text-blue-400">NexNews</span>
                </div>
                <button id="closeSidebar" class="p-2 hover:bg-zinc-800 rounded-full text-white">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <nav class="space-y-2 flex-1">
                <button onclick="changePage('home')" class="nav-item w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all font-medium bg-blue-900/20 text-blue-400" data-page="home">
                    <i data-lucide="home" class="w-5 h-5"></i> Главная
                </button>
                <button onclick="changePage('favorites')" class="nav-item w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all font-medium text-zinc-400 hover:bg-zinc-800" data-page="favorites">
                    <i data-lucide="bookmark" class="w-5 h-5"></i> Избранное
                </button>
                <button onclick="changePage('history')" class="nav-item w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all font-medium text-zinc-400 hover:bg-zinc-800" data-page="history">
                    <i data-lucide="history" class="w-5 h-5"></i> История
                </button>
            </nav>

            <div class="mt-auto pt-6 border-t border-zinc-800">
                <a href="https://t.me/brows_nexus" target="_blank" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-900/10 text-blue-400 hover:bg-blue-900/20 transition-all font-bold">
                    <i data-lucide="send" class="w-5 h-5"></i>
                    <span>Мы в телеграм</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="max-w-2xl mx-auto px-4 py-6">
            <div class="flex items-center justify-between mb-6">
                <h1 id="pageTitle" class="text-2xl font-black tracking-tight text-white">Главные новости</h1>
                <button id="refreshBtn" class="flex items-center gap-2 text-xs font-bold text-blue-400 hover:bg-blue-900/20 px-3 py-1.5 rounded-full transition-all">
                    <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> Обновить
                </button>
            </div>

            <div id="newsContainer" class="space-y-6">
                <!-- News items will be injected here -->
                <div class="flex flex-col items-center justify-center py-20">
                    <i data-lucide="refresh-cw" class="w-10 h-10 text-blue-600 animate-spin mb-4"></i>
                    <p class="text-zinc-400">Загрузка свежих новостей...</p>
                </div>
            </div>

            <button id="loadMoreBtn" class="w-full mt-8 py-5 bg-[#1e1e1e] border border-zinc-800 rounded-2xl font-black text-blue-400 hover:shadow-lg transition-all flex items-center justify-center gap-3 hidden">
                <i data-lucide="zap" class="w-5 h-5"></i> Загрузить еще больше новостей
            </button>
        </main>

        <!-- Login Modal -->
        <div id="loginModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-md p-4 hidden opacity-0 transition-opacity duration-300">
            <div class="bg-[#1e1e1e] p-10 rounded-[32px] max-w-sm w-full text-center shadow-2xl border border-zinc-800">
                <div class="w-20 h-20 bg-blue-600/10 rounded-3xl flex items-center justify-center mx-auto mb-8">
                    <i data-lucide="newspaper" class="w-10 h-10 text-blue-600"></i>
                </div>
                <h2 class="text-3xl font-black mb-3 text-white">NexNews</h2>
                <p class="text-zinc-400 text-sm mb-10 leading-relaxed">Войдите через Google, чтобы получить персональную ленту и сохранять избранное.</p>
                <button id="googleSignInBtn" class="w-full flex items-center justify-center gap-4 bg-white text-black font-black py-4 px-6 rounded-2xl hover:scale-[1.02] active:scale-[0.98] transition-all mb-6 shadow-xl shadow-blue-600/10">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" class="w-6 h-6"> Войти с Google
                </button>
                <button id="skipLoginBtn" class="text-zinc-400 hover:text-zinc-200 text-sm font-bold transition-colors">Пропустить</button>
            </div>
        </div>
    </div>

    <!-- Firebase & Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            projectId: "gen-lang-client-0149034325",
            appId: "1:316174573195:web:cb64af10a5287aed4a3e8e",
            apiKey: "AIzaSyA3BqQPNZ1XkIPpVJwUV2vHLdMFoT5vYao",
            authDomain: "gen-lang-client-0149034325.firebaseapp.com",
            storageBucket: "gen-lang-client-0149034325.firebasestorage.app",
            messagingSenderId: "316174573195"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // State
        let user = null;
        let news = [];
        let favorites = JSON.parse(localStorage.getItem('nexnews-favs') || '[]');
        let history = JSON.parse(localStorage.getItem('nexnews-history') || '[]');
        let currentPage = 'home';
        let isLoading = false;

        // UI Elements
        const newsContainer = document.getElementById('newsContainer');
        const userArea = document.getElementById('userArea');
        const loginModal = document.getElementById('loginModal');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const pageTitle = document.getElementById('pageTitle');
        const loadMoreBtn = document.getElementById('loadMoreBtn');

        // Initialize Icons
        lucide.createIcons();

        // Auth Listener
        onAuthStateChanged(auth, (u) => {
            user = u;
            updateUserUI();
            if (!u && !localStorage.getItem('nexnews-skip-login')) {
                showModal(loginModal);
            }
        });

        function updateUserUI() {
            if (user) {
                userArea.innerHTML = `
                    <div class="relative group">
                        <button class="flex items-center gap-1 p-1 hover:bg-zinc-800 rounded-full transition-colors">
                            <img src="${user.photoURL}" class="w-8 h-8 rounded-full border border-zinc-700" alt="">
                            <i data-lucide="chevron-down" class="w-4 h-4 text-zinc-500"></i>
                        </button>
                        <div class="absolute right-0 mt-2 w-64 bg-[#1e1e1e] border border-zinc-800 rounded-2xl shadow-2xl overflow-hidden hidden group-hover:block z-50">
                            <div class="p-4 border-b border-zinc-800">
                                <p class="font-bold text-white truncate">${user.displayName}</p>
                                <p class="text-xs text-zinc-400 truncate">${user.email}</p>
                            </div>
                            <div class="p-2">
                                <button id="logoutBtn" class="w-full flex items-center gap-2 px-3 py-2 text-sm text-red-500 hover:bg-red-900/20 rounded-lg transition-colors">
                                    <i data-lucide="log-out" class="w-4 h-4"></i> Выйти
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                document.getElementById('logoutBtn')?.addEventListener('click', () => signOut(auth));
                lucide.createIcons();
            } else {
                userArea.innerHTML = `
                    <button id="loginBtn" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold py-2 px-4 rounded-full transition-all">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-4 h-4" alt="">
                        <span>Войти</span>
                    </button>
                `;
                document.getElementById('loginBtn')?.addEventListener('click', () => showModal(loginModal));
            }
        }

        // News Fetching
        async function fetchNews(isLoadMore = false) {
            if (isLoading) return;
            isLoading = true;
            if (!isLoadMore) newsContainer.innerHTML = '<div class="flex flex-col items-center justify-center py-20"><i data-lucide="refresh-cw" class="w-10 h-10 text-blue-600 animate-spin mb-4"></i><p class="text-zinc-400">Загрузка свежих новостей...</p></div>';
            lucide.createIcons();

            // Detect Country via Geolocation or fallback
            let country = "Россия"; // Default
            try {
                const geoRes = await fetch('https://ipapi.co/json/');
                const geoData = await geoRes.json();
                if (geoData.country_name) country = geoData.country_name;
            } catch (e) { console.error("Geo error:", e); }

            // Improved Recommendation Logic: Extract keywords from favorites and history
            const favKeywords = favorites.map(f => f.title.split(' ').filter(w => w.length > 5)).flat().slice(0, 10).join(', ');
            const historyKeywords = history.map(h => h.title.split(' ').filter(w => w.length > 5)).flat().slice(0, 10).join(', ');
            const interests = [favKeywords, historyKeywords, country, "политика"].filter(Boolean).join(', ');

            const prompt = `Ты - NexNews. Твоя задача - найти 30 САМЫХ СВЕЖИХ новостей на РУССКОМ языке за сегодня. 
            ГЛАВНЫЙ ПРИОРИТЕТ: Новости страны: ${country}. Минимум 90% новостей должны быть об этой стране.
            ПЕРСОНАЛИЗАЦИЯ: Пользователь интересуется темами: ${interests}. Сделай ленту максимально релевантной его интересам.
            Верни JSON массив объектов: id, title, summary, url, source, publishedAt, category, imageUrl. 
            Используй googleSearch. Будь быстр.`;

            try {
                // Вызываем внутренний API, чтобы скрыть ключ
                const response = await fetch('/api/news', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                if (!response.ok) throw new Error('Server error');
                
                const result = await response.json();
                const newItems = result.news || [];
                
                if (newItems.length === 0) {
                    newsContainer.innerHTML = '<div class="text-center py-20 text-zinc-400">Новостей пока нет. Попробуйте обновить позже.</div>';
                    return;
                }

                if (isLoadMore) news = [...news, ...newItems];
                else news = newItems;

                renderNews();
            } catch (error) {
                console.error("Fetch error:", error);
                newsContainer.innerHTML = '<div class="text-center py-20 text-red-500">Ошибка загрузки. Проверьте API ключ.</div>';
            } finally {
                isLoading = false;
                loadMoreBtn.classList.remove('hidden');
            }
        }

        function renderNews() {
            let itemsToRender = [];
            if (currentPage === 'home') itemsToRender = news;
            else if (currentPage === 'favorites') itemsToRender = favorites;
            else if (currentPage === 'history') itemsToRender = history;

            if (itemsToRender.length === 0) {
                newsContainer.innerHTML = '<div class="text-center py-20"><i data-lucide="newspaper" class="w-12 h-12 text-zinc-700 mx-auto mb-4"></i><p class="text-zinc-400">Здесь пока ничего нет</p></div>';
                lucide.createIcons();
                return;
            }

            newsContainer.innerHTML = itemsToRender.map((item, i) => `
                <article class="bg-[#1e1e1e] border border-zinc-800 rounded-2xl overflow-hidden hover:shadow-xl transition-all group">
                    <div class="p-4 flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <div class="w-6 h-6 bg-zinc-800 rounded-full flex items-center justify-center border border-zinc-700">
                                <i data-lucide="newspaper" class="w-3 h-3 text-zinc-400"></i>
                            </div>
                            <span class="text-xs font-bold text-zinc-300">${item.source}</span>
                        </div>
                        <button onclick="toggleFavorite('${item.url}')" class="p-1 ${favorites.some(f => f.url === item.url) ? 'text-red-500' : 'text-zinc-400 hover:text-red-500'}">
                            <i data-lucide="heart" class="w-4 h-4 ${favorites.some(f => f.url === item.url) ? 'fill-current' : ''}"></i>
                        </button>
                    </div>
                    <div class="cursor-pointer" onclick="openNews('${item.url}', '${item.title.replace(/'/g, "\\'")}', '${item.source}', '${item.imageUrl || ''}', '${item.category || ''}')">
                        ${item.imageUrl ? `
                            <div class="px-4">
                                <div class="aspect-video rounded-xl overflow-hidden bg-zinc-800 relative">
                                    <img src="${item.imageUrl}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" onerror="this.style.display='none'">
                                    <div class="absolute top-2 right-2 px-2 py-1 bg-black/50 backdrop-blur-md rounded-lg text-[10px] font-bold text-white uppercase">${item.category || 'Новости'}</div>
                                </div>
                            </div>
                        ` : ''}
                        <div class="p-4 pt-3">
                            <h2 class="text-lg font-bold leading-tight text-white group-hover:text-blue-400 transition-colors">${item.title}</h2>
                            <p class="mt-2 text-sm text-zinc-400 line-clamp-2 opacity-80">${item.summary}</p>
                        </div>
                    </div>
                    <div class="px-4 pb-4 flex items-center justify-between">
                        <div class="flex items-center gap-1.5 text-[10px] text-zinc-400 font-medium">
                            <i data-lucide="clock" class="w-3 h-3"></i>
                            ${new Date(item.publishedAt).toLocaleDateString('ru-RU')}
                        </div>
                        <button onclick="shareNews('${item.url}', '${item.title.replace(/'/g, "\\'")}')" class="p-1 text-zinc-400 hover:text-blue-500">
                            <i data-lucide="share-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </article>
            `).join('');
            lucide.createIcons();
        }

        // Global Actions
        window.openNews = (url, title, source, imageUrl, category) => {
            const entry = { title, url, source, imageUrl, category, viewedAt: new Date().toISOString() };
            history = [entry, ...history.filter(h => h.url !== url)].slice(0, 50);
            localStorage.setItem('nexnews-history', JSON.stringify(history));
            window.open(url, '_blank');
        };

        window.toggleFavorite = (url) => {
            const item = news.find(n => n.url === url) || favorites.find(f => f.url === url);
            if (!item) return;
            const isFav = favorites.some(f => f.url === url);
            if (isFav) favorites = favorites.filter(f => f.url !== url);
            else favorites = [item, ...favorites];
            localStorage.setItem('nexnews-favs', JSON.stringify(favorites));
            renderNews();
        };

        window.shareNews = (url, title) => {
            if (navigator.share) navigator.share({ title, url });
            else { navigator.clipboard.writeText(url); alert("Ссылка скопирована!"); }
        };

        window.changePage = (page) => {
            currentPage = page;
            pageTitle.innerText = page === 'home' ? 'Главные новости' : (page === 'favorites' ? 'Избранное' : 'История');
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('bg-blue-900/20', 'text-blue-400');
                el.classList.add('text-zinc-400', 'hover:bg-zinc-800');
                if (el.dataset.page === page) {
                    el.classList.add('bg-blue-900/20', 'text-blue-400');
                    el.classList.remove('text-zinc-400', 'hover:bg-zinc-800');
                }
            });
            hideModal(sidebar);
            hideModal(sidebarOverlay);
            renderNews();
        };

        // UI Helpers
        function showModal(el) { el.classList.remove('hidden'); setTimeout(() => el.classList.add('opacity-100'), 10); }
        function hideModal(el) { el.classList.remove('opacity-100'); setTimeout(() => el.classList.add('hidden'), 300); }

        // Event Listeners
        document.getElementById('menuBtn').addEventListener('click', () => { showModal(sidebar); showModal(sidebarOverlay); sidebar.classList.remove('-translate-x-full'); });
        document.getElementById('closeSidebar').addEventListener('click', () => { hideModal(sidebarOverlay); sidebar.classList.add('-translate-x-full'); });
        sidebarOverlay.addEventListener('click', () => { hideModal(sidebarOverlay); sidebar.classList.add('-translate-x-full'); });
        document.getElementById('skipLoginBtn').addEventListener('click', () => { hideModal(loginModal); localStorage.setItem('nexnews-skip-login', 'true'); });
        document.getElementById('googleSignInBtn').addEventListener('click', () => signInWithPopup(auth, provider).then(() => hideModal(loginModal)));
        document.getElementById('refreshBtn').addEventListener('click', () => fetchNews());
        loadMoreBtn.addEventListener('click', () => fetchNews(true));

        // Initial Load
        fetchNews();
    </script>
</body>
</html>
