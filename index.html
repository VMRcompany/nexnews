<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexNews — Google News Style</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Roboto', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8f9fa; color: #202124; transition: background-color 0.3s; }
        .dark body { background-color: #121212; color: #e8eaed; }
        .google-shadow { box-shadow: 0 1px 2px 0 rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15); }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .sidebar-transition { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="dark">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        function App() {
            const [news, setNews] = useState([]);
            const [loading, setLoading] = useState(true);
            const [darkMode, setDarkMode] = useState(true);
            const [showSidebar, setShowSidebar] = useState(false);
            const [favorites, setFavorites] = useState([]);
            const [history, setHistory] = useState([]);
            const [currentPage, setCurrentPage] = useState('home');

            // Загрузка данных
            useEffect(() => {
                const savedFavs = localStorage.getItem('nex-favs');
                if (savedFavs) setFavorites(JSON.parse(savedFavs));
                const savedHistory = localStorage.getItem('nex-history');
                if (savedHistory) setHistory(JSON.parse(savedHistory));
                
                loadNewsData();
            }, []);

            // Прямая загрузка новостей (через прокси для RSS)
            const loadNewsData = async () => {
                setLoading(true);
                try {
                    // Используем открытый RSS фид Google News Россия
                    const rssUrl = encodeURIComponent('https://news.google.com/rss/search?q=Россия&hl=ru&gl=RU&ceid=RU:ru');
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`);
                    const data = await res.json();
                    
                    if (data.items) {
                        const formatted = data.items.map((item, idx) => ({
                            id: idx,
                            title: item.title,
                            summary: item.content || item.description,
                            url: item.link,
                            source: item.author || 'Google News',
                            publishedAt: item.pubDate,
                            imageUrl: item.enclosure?.link || `https://picsum.photos/seed/${idx}/800/450`,
                            category: 'Главное'
                        }));
                        setNews(formatted);
                    }
                } catch (e) {
                    console.error("Ошибка загрузки:", e);
                }
                setLoading(false);
            };

            const toggleTheme = () => {
                setDarkMode(!darkMode);
                document.body.classList.toggle('dark');
            };

            const trackClick = (item) => {
                const newHistory = [item, ...history.filter(h => h.url !== item.url)].slice(0, 50);
                setHistory(newHistory);
                localStorage.setItem('nex-history', JSON.stringify(newHistory));
                window.open(item.url, '_blank');
            };

            const toggleFav = (e, item) => {
                e.stopPropagation();
                const isFav = favorites.some(f => f.url === item.url);
                const newFavs = isFav ? favorites.filter(f => f.url !== item.url) : [item, ...favorites];
                setFavorites(newFavs);
                localStorage.setItem('nex-favs', JSON.stringify(newFavs));
            };

            // Алгоритм рекомендаций (простое совпадение по ключевым словам из истории)
            const recommendedNews = useMemo(() => {
                if (history.length === 0) return news.slice(0, 10);
                const keywords = history.map(h => h.title.split(' ')).flat().filter(w => w.length > 5);
                return news.filter(n => keywords.some(k => n.title.includes(k))).slice(0, 10);
            }, [news, history]);

            const displayItems = currentPage === 'home' ? news : currentPage === 'favs' ? favorites : history;

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className={`fixed top-0 left-0 right-0 z-50 h-16 flex items-center px-4 border-b transition-colors ${darkMode ? 'bg-[#121212] border-zinc-800' : 'bg-white border-zinc-200'}`}>
                        <div className="flex items-center gap-4 w-full max-w-7xl mx-auto">
                            <button onClick={() => setShowSidebar(true)} className="p-2 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded-full">
                                <i data-lucide="menu" className="w-6 h-6"></i>
                            </button>
                            
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => setCurrentPage('home')}>
                                <img src="https://upload.wikimedia.org/wikipedia/commons/d/da/Google_News_icon.svg" className="w-8 h-8" alt="Logo" />
                                <span className="text-xl font-medium tracking-tight hidden sm:block">NexNews</span>
                            </div>

                            <div className="flex-1 max-w-2xl mx-auto px-4 hidden md:block">
                                <div className={`flex items-center gap-3 px-4 py-2 rounded-lg transition-colors ${darkMode ? 'bg-zinc-800' : 'bg-zinc-100'}`}>
                                    <i data-lucide="search" className="w-5 h-5 text-zinc-500"></i>
                                    <input type="text" placeholder="Поиск тем, мест и источников" className="bg-transparent border-none outline-none w-full text-sm" />
                                </div>
                            </div>

                            <div className="flex items-center gap-2">
                                <button onClick={toggleTheme} className="p-2 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded-full">
                                    <i data-lucide={darkMode ? "sun" : "moon"} className="w-5 h-5"></i>
                                </button>
                                <div className="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-sm">V</div>
                            </div>
                        </div>
                    </header>

                    {/* Sidebar */}
                    <AnimatePresence>
                        {showSidebar && (
                            <>
                                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} onClick={() => setShowSidebar(false)} className="fixed inset-0 bg-black/50 z-[60]" />
                                <motion.aside initial={{ x: '-100%' }} animate={{ x: 0 }} exit={{ x: '-100%' }} className={`fixed top-0 left-0 bottom-0 w-64 z-[70] p-4 flex flex-col sidebar-transition ${darkMode ? 'bg-[#1e1e1e]' : 'bg-white'}`}>
                                    <div className="flex items-center gap-4 mb-8">
                                        <button onClick={() => setShowSidebar(false)} className="p-2 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded-full">
                                            <i data-lucide="x" className="w-6 h-6"></i>
                                        </button>
                                        <span className="text-xl font-medium">NexNews</span>
                                    </div>
                                    <nav className="space-y-1">
                                        {[
                                            { id: 'home', label: 'Главные новости', icon: 'newspaper' },
                                            { id: 'favs', label: 'Избранное', icon: 'star' },
                                            { id: 'history', label: 'История', icon: 'history' },
                                        ].map(item => (
                                            <button key={item.id} onClick={() => {setCurrentPage(item.id); setShowSidebar(false)}} className={`w-full flex items-center gap-4 px-4 py-3 rounded-r-full text-sm font-medium transition-colors ${currentPage === item.id ? 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400' : 'hover:bg-zinc-100 dark:hover:bg-zinc-800'}`}>
                                                <i data-lucide={item.icon} className="w-5 h-5"></i>
                                                {item.label}
                                            </button>
                                        ))}
                                    </nav>
                                    <div className="mt-auto pt-4 border-t border-zinc-200 dark:border-zinc-800">
                                        <a href="https://t.me/brows_nexus" target="_blank" className="flex items-center gap-4 px-4 py-3 text-sm font-medium text-blue-600">
                                            <i data-lucide="send" className="w-5 h-5"></i>
                                            Telegram канал
                                        </a>
                                    </div>
                                </motion.aside>
                            </>
                        )}
                    </AnimatePresence>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto pt-24 px-4 pb-20 grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2 space-y-6">
                            <h2 className="text-2xl font-medium mb-4">{currentPage === 'home' ? 'Главные новости' : currentPage === 'favs' ? 'Избранное' : 'История'}</h2>
                            
                            {loading ? (
                                <div className="flex justify-center py-20"><i data-lucide="refresh-cw" className="w-10 h-10 animate-spin text-blue-600"></i></div>
                            ) : (
                                <div className="space-y-4">
                                    {displayItems.map((item, i) => (
                                        <motion.div key={i} initial={{ opacity: 0 }} animate={{ opacity: 1 }} className={`p-4 rounded-xl border transition-all cursor-pointer flex gap-4 ${darkMode ? 'bg-[#1e1e1e] border-zinc-800 hover:bg-zinc-800' : 'bg-white border-zinc-200 hover:shadow-md'}`} onClick={() => trackClick(item)}>
                                            <div className="flex-1">
                                                <div className="flex items-center gap-2 mb-2">
                                                    <span className="text-xs font-bold text-blue-600 uppercase">{item.source}</span>
                                                    <span className="text-xs text-zinc-500">• {new Date(item.publishedAt).toLocaleDateString()}</span>
                                                </div>
                                                <h3 className="text-lg font-medium leading-snug mb-2">{item.title}</h3>
                                                <p className="text-sm text-zinc-500 line-clamp-3">{item.summary}</p>
                                                <div className="mt-4 flex items-center gap-4">
                                                    <button onClick={(e) => toggleFav(e, item)} className={`p-1 rounded-full hover:bg-zinc-200 dark:hover:bg-zinc-700 ${favorites.some(f => f.url === item.url) ? 'text-yellow-500' : 'text-zinc-400'}`}>
                                                        <i data-lucide="star" className={`w-5 h-5 ${favorites.some(f => f.url === item.url) ? 'fill-current' : ''}`}></i>
                                                    </button>
                                                    <button className="p-1 text-zinc-400 hover:bg-zinc-200 dark:hover:bg-zinc-700 rounded-full"><i data-lucide="share-2" className="w-5 h-5"></i></button>
                                                </div>
                                            </div>
                                            {item.imageUrl && (
                                                <div className="w-24 h-24 sm:w-32 sm:h-32 rounded-lg overflow-hidden flex-shrink-0">
                                                    <img src={item.imageUrl} className="w-full h-full object-cover" alt="" />
                                                </div>
                                            )}
                                        </motion.div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Sidebar Recommendations */}
                        <div className="hidden lg:block space-y-6">
                            <div className={`p-6 rounded-2xl border ${darkMode ? 'bg-[#1e1e1e] border-zinc-800' : 'bg-white border-zinc-200'}`}>
                                <h3 className="text-xl font-medium mb-4 flex items-center gap-2">
                                    <i data-lucide="zap" className="w-5 h-5 text-blue-600"></i>
                                    Рекомендации для вас
                                </h3>
                                <div className="space-y-4">
                                    {recommendedNews.map((item, i) => (
                                        <div key={i} onClick={() => trackClick(item)} className="cursor-pointer group">
                                            <p className="text-xs font-bold text-zinc-500 mb-1">{item.source}</p>
                                            <h4 className="text-sm font-medium group-hover:text-blue-600 transition-colors line-clamp-2">{item.title}</h4>
                                            <div className="h-px bg-zinc-200 dark:bg-zinc-800 mt-3" />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Footer Mobile Nav */}
                    <div className={`fixed bottom-0 left-0 right-0 h-14 border-t flex items-center justify-around sm:hidden z-50 ${darkMode ? 'bg-[#121212] border-zinc-800' : 'bg-white border-zinc-200'}`}>
                        <button onClick={() => setCurrentPage('home')} className={`p-2 ${currentPage === 'home' ? 'text-blue-600' : 'text-zinc-500'}`}><i data-lucide="home" className="w-6 h-6"></i></button>
                        <button onClick={() => setCurrentPage('favs')} className={`p-2 ${currentPage === 'favs' ? 'text-blue-600' : 'text-zinc-500'}`}><i data-lucide="star" className="w-6 h-6"></i></button>
                        <button onClick={() => setCurrentPage('history')} className={`p-2 ${currentPage === 'history' ? 'text-blue-600' : 'text-zinc-500'}`}><i data-lucide="history" className="w-6 h-6"></i></button>
                    </div>
                </div>
            );
        }

        // Инициализация иконок после рендера
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Наблюдатель за изменениями в DOM для иконок Lucide
        const observer = new MutationObserver(() => {
            if (window.lucide) window.lucide.createIcons();
        });
        observer.observe(document.getElementById('root'), { childList: true, subtree: true });
    </script>
</body>
</html>
